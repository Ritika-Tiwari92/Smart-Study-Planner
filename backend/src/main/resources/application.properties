# ─────────────────────────────────────────
# Database Configuration
# ─────────────────────────────────────────
# ─────────────────────────────────────────
# Database
# ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/studyplanner_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# ─────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
server.error.include-message=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────
# Server
# ─────────────────────────────────────────
server.port=8080
spring.application.name=studyplanner

# ─────────────────────────────────────────
# JWT
# ─────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=900000

# ─────────────────────────────────────────
# Gmail SMTP Configuratio
# ─────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─────────────────────────────────────────
# API Keys
# ─────────────────────────────────────────
groq.api.key=${GROQ_API_KEY}
groq.api.base-url=https://api.groq.com/openai/v1
# ─────────────────────────────────────────
# File Upload
# ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.syllabus.upload-dir=uploads/syllabus