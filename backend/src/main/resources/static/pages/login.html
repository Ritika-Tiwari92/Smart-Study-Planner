<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>Login | EduMind AI</title>

     <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

     <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

     <!-- CSS Files -->
     <link rel="stylesheet" href="../assets/css/variables.css">
     <link rel="stylesheet" href="../assets/css/base.css">
     <link rel="stylesheet" href="../assets/css/layout.css">
     <link rel="stylesheet" href="../assets/css/components.css">
</head>

<body>
     <div class="login-page">
          <div class="login-left">
               <div class="login-brand">
                    <h1><i class="fa-solid fa-graduation-cap"></i> EduMind AI</h1>
                    <p>Smart Study Planning System</p>
               </div>

               <div class="login-box">
                    <h2>Welcome Back</h2>
                    <p class="login-subtext">Login to manage your study plans, tasks, and progress in one place.</p>

                    <form class="login-form">
                         <div class="form-group">
                              <label for="email">Email</label>
                              <div class="input-box">
                                   <i class="fa-solid fa-envelope"></i>
                                   <input type="email" id="email" placeholder="Enter your email">
                              </div>
                         </div>

                         <div class="form-group">
                              <label for="password">Password</label>
                              <div class="input-box">
                                   <i class="fa-solid fa-lock"></i>
                                   <input type="password" id="password" placeholder="Enter your password">
                              </div>
                         </div>

                         <div class="login-options">
                              <label class="remember-me">
                                   <input type="checkbox">
                                   <span>Remember me</span>
                              </label>
                              <a href="#">Forgot Password?</a>
                         </div>

                         <button type="submit" class="login-btn">Sign In</button>
                    </form>

                    <p class="login-footer-text">Stay organized, stay focused, and study smarter.</p>
               </div>
          </div>

          <div class="login-right">
               <img src="../assets/images/login-illustration.svg" alt="Login Illustration">
          </div>
     </div>
</body>

</html>
